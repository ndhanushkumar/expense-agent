name: Daily Expense Job

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  run-job:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore Gmail auth files
        run: |
          printf '%s' "${{ secrets.GMAIL_CREDENTIALS_JSON }}" > credentials.json
          echo "${{ secrets.GMAIL_TOKEN_PICKLE_B64 }}" | base64 --decode > token.pickle
          chmod 600 credentials.json token.pickle

      - name: Run daily parser
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -c "from agent.agent import run; run(max_emails=50)"
