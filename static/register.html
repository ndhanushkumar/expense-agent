<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Expense Agent</title>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Cabinet+Grotesk:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f5f3ee;
        --ink: #1c1a17;
        --muted: #8e877b;
        --card: #fff;
        --line: #ddd9d0;
        --accent: #1a7a40;
        --accent-ink: #eaf9ef;
        --mono: "IBM Plex Mono", monospace;
        --sans: "Cabinet Grotesk", sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--sans);
        color: var(--ink);
        background:
          radial-gradient(
            900px 420px at 110% 120%,
            #dfeeda 0%,
            transparent 60%
          ),
          radial-gradient(
            1000px 420px at -30% -20%,
            #e9e2d3 0%,
            transparent 60%
          ),
          var(--bg);
        display: grid;
        place-items: center;
        padding: 20px;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
        overflow: hidden;
      }
      .top {
        padding: 22px 22px 14px;
        border-bottom: 1px solid var(--line);
      }
      .brand {
        font-family: var(--mono);
        font-size: 12px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .brand em {
        color: var(--accent);
        font-style: normal;
      }
      h1 {
        margin: 10px 0 6px;
        font-size: 32px;
        line-height: 1;
        letter-spacing: -0.03em;
      }
      .sub {
        margin: 0;
        font-size: 13px;
        color: var(--muted);
      }
      .register-wrap {
        padding: 18px 22px 22px;
        display: grid;
        gap: 14px;
      }
      .oauth-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        text-decoration: none;
        border-radius: 12px;
        padding: 11px 14px;
        font-family: var(--mono);
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        font-weight: 500;
      }
      .oauth-btn:hover {
        background: #eef7ef;
      }
      .err {
        min-height: 18px;
        margin: 0;
        font-family: var(--mono);
        font-size: 11px;
        color: #c0392b;
      }
      .help {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
      }
      a {
        color: var(--ink);
        font-family: var(--mono);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="top">
        <div class="brand">expense<em>_</em>agent</div>
        <h1>Google login only</h1>
        <p class="sub">
          Use your Gmail account to access the expense dashboard.
        </p>
      </div>
      <div class="register-wrap">
        <a class="oauth-btn" href="/auth/google/start">Continue with Google</a>
        <p class="help">
          Password registration is disabled because Gmail access is required.
        </p>
        <p class="err" id="error"></p>
        <a href="/login">Back to login</a>
      </div>
    </div>

    <script>
      const err = document.getElementById("error");

      async function ensureLoggedOut() {
        const meRes = await fetch("/auth/me");
        if (meRes.ok) {
          window.location.href = "/dashboard";
        }
      }

      ensureLoggedOut();
    </script>
  </body>
</html>
