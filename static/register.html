<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Expense Agent</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f8fafc;
        --ink: #0f172a;
        --muted: #64748b;
        --card: #ffffff;
        --line: #e2e8f0;
        --accent: #334155;
        --mono: "JetBrains Mono", monospace;
        --sans: "Inter", sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--sans);
        color: var(--ink);
        background: var(--bg);
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 420px;
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
        overflow: hidden;
      }
      .top {
        padding: 24px 24px 16px;
        border-bottom: 1px solid var(--line);
      }
      .brand {
        font-family: var(--mono);
        font-size: 12px;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .brand em {
        color: var(--accent);
        font-style: normal;
      }
      h1 {
        margin: 12px 0 8px;
        font-size: 30px;
        line-height: 1.08;
        letter-spacing: -0.025em;
      }
      .sub {
        margin: 0;
        font-size: 14px;
        color: var(--muted);
      }
      .register-wrap {
        padding: 20px 24px 24px;
        display: grid;
        gap: 12px;
      }
      .oauth-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        border: 1px solid var(--line);
        background: var(--card);
        color: var(--ink);
        text-decoration: none;
        border-radius: 10px;
        padding: 12px 14px;
        font-family: var(--mono);
        font-size: 12px;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        font-weight: 500;
        transition:
          border-color 0.15s ease,
          background 0.15s ease;
      }
      .oauth-btn:hover {
        border-color: var(--accent);
        background: #f8fafc;
      }
      .err {
        min-height: 18px;
        margin: 0;
        font-family: var(--mono);
        font-size: 11px;
        color: #b91c1c;
      }
      .help {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        line-height: 1.6;
      }
      a {
        color: var(--accent);
        font-family: var(--mono);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="top">
        <div class="brand">expense<em>_</em>agent</div>
        <h1>Google login only</h1>
        <p class="sub">
          Use your Gmail account to access the expense dashboard.
        </p>
      </div>
      <div class="register-wrap">
        <a class="oauth-btn" href="/auth/google/start">Continue with Google</a>
        <p class="help">
          Password registration is disabled because Gmail access is required.
        </p>
        <p class="err" id="error"></p>
        <a href="/login">Back to login</a>
      </div>
    </div>

    <script>
      const err = document.getElementById("error");

      async function ensureLoggedOut() {
        const meRes = await fetch("/auth/me");
        if (meRes.ok) {
          window.location.href = "/dashboard";
        }
      }

      ensureLoggedOut();
    </script>
  </body>
</html>
